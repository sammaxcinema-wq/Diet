<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriPlan – Smart Diet Planner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
        }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="root"></div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;
        const { ChevronLeft, ChevronRight, Search, Plus, Settings, Moon, Sun, Bell, Droplet, TrendingUp, Zap } = LucideReact;

        // ----------------------------------------------------------------------
        // CONSTANTS
        // ----------------------------------------------------------------------
        const FOOD_DATABASE = [
            { id: 1,  name: 'Chicken Breast', calories: 165, protein: 31,  carbs: 0,   fat: 3.6, fiber: 0,   emoji: '🍗' },
            { id: 2,  name: 'Rice',           calories: 130, protein: 2.7, carbs: 28,  fat: 0.3, fiber: 0.4, emoji: '🍚' },
            { id: 3,  name: 'Ugali',          calories: 150, protein: 3.5, carbs: 31,  fat: 1.2, fiber: 0.5, emoji: '🌽' },
            { id: 4,  name: 'Beef',           calories: 250, protein: 26,  carbs: 0,   fat: 15,  fiber: 0,   emoji: '🥩' },
            { id: 5,  name: 'Fish',           calories: 100, protein: 22,  carbs: 0,   fat: 0.9, fiber: 0,   emoji: '🐟' },
            { id: 6,  name: 'Milk',           calories: 61,  protein: 3.2, carbs: 4.8, fat: 3.3, fiber: 0,   emoji: '🥛' },
            { id: 7,  name: 'Broccoli',       calories: 34,  protein: 2.8, carbs: 7,   fat: 0.4, fiber: 2.4, emoji: '🥦' },
            { id: 8,  name: 'Carrot',         calories: 41,  protein: 0.9, carbs: 10,  fat: 0.2, fiber: 2.8, emoji: '🥕' },
            { id: 9,  name: 'Avocado',        calories: 160, protein: 2,   carbs: 9,   fat: 15,  fiber: 7,   emoji: '🥑' },
            { id: 10, name: 'Banana',         calories: 89,  protein: 1.1, carbs: 23,  fat: 0.3, fiber: 2.6, emoji: '🍌' },
            { id: 11, name: 'Apple',          calories: 52,  protein: 0.3, carbs: 14,  fat: 0.2, fiber: 2.4, emoji: '🍎' },
            { id: 12, name: 'Watermelon',     calories: 30,  protein: 0.6, carbs: 7.6, fat: 0.2, fiber: 0.4, emoji: '🍉' },
            { id: 13, name: 'Eggs',           calories: 155, protein: 13,  carbs: 1.1, fat: 11,  fiber: 0,   emoji: '🥚' },
            { id: 14, name: 'Oats',           calories: 389, protein: 17,  carbs: 66,  fat: 6.9, fiber: 10.6,emoji: '🌾' },
            { id: 15, name: 'Pizza',          calories: 285, protein: 12,  carbs: 36,  fat: 10,  fiber: 1.8, emoji: '🍕' },
            { id: 16, name: 'Burger',         calories: 354, protein: 17,  carbs: 35,  fat: 16,  fiber: 1.5, emoji: '🍔' },
            { id: 17, name: 'Toast',          calories: 265, protein: 9,   carbs: 49,  fat: 3.3, fiber: 2.7, emoji: '🍞' },
        ];

        const WEEK_DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const MEAL_TYPES = ['Breakfast', 'Lunch', 'Dinner', 'Snacks'];

        // ----------------------------------------------------------------------
        // UTILITY FUNCTIONS
        // ----------------------------------------------------------------------
        function getWeekStart(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setDate(diff);
            return d;
        }

        function getDateKey(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function initializeMeals() {
            const today = getDateKey(new Date());
            const meals = {};
            meals[today] = {
                Breakfast: [
                    { id: 1, name: 'Eggs',  emoji: '🥚', calories: 155, protein: 13,  carbs: 1.1, fat: 11,  fiber: 0 },
                    { id: 2, name: 'Toast', emoji: '🍞', calories: 265, protein: 9,   carbs: 49,  fat: 3.3, fiber: 2.7 },
                ],
                Lunch: [],
                Dinner: [],
                Snacks: [],
            };
            return meals;
        }

        // ----------------------------------------------------------------------
        // APP COMPONENT
        // ----------------------------------------------------------------------
        function DietPlannerApp() {
            const [user] = useState({ name: 'Sarah Johnson', avatar: '👤', email: 'sarah@example.com' });
            const [darkMode, setDarkMode] = useState(true);
            const [currentWeekStart, setCurrentWeekStart] = useState(getWeekStart(new Date()));
            const [meals, setMeals] = useState(initializeMeals());
            const [selectedDay, setSelectedDay] = useState(null);
            const [selectedMeal, setSelectedMeal] = useState(null);
            const [showFoodSearch, setShowFoodSearch] = useState(false);
            const [waterIntake, setWaterIntake] = useState(6);
            const [weight, setWeight] = useState(72);
            const [healthMetrics, setHealthMetrics] = useState({ calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });

            // NaN-safe weight change (Critical fix #1)
            const lastValidWeight = useRef(72);
            const handleWeightChange = useCallback((rawValue) => {
                const parsed = parseFloat(rawValue);
                if (!isNaN(parsed) && parsed > 0) {
                    lastValidWeight.current = parsed;
                    setWeight(parsed);
                } else {
                    setWeight(lastValidWeight.current); // revert to last valid
                }
            }, []);

            const handleWaterChange = useCallback((val) => setWaterIntake(Math.min(8, Math.max(0, val))), []);

            // Recalculate daily nutrition whenever meals change
            useEffect(() => {
                const todayKey = getDateKey(new Date());
                const todayMeals = meals[todayKey] || {};
                let totals = { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };

                Object.values(todayMeals).forEach(meal => {
                    if (Array.isArray(meal)) {
                        meal.forEach(food => {
                            totals.calories += food.calories || 0;
                            totals.protein += food.protein || 0;
                            totals.carbs   += food.carbs   || 0;
                            totals.fat     += food.fat     || 0;
                            totals.fiber   += food.fiber   || 0;
                        });
                    }
                });

                setHealthMetrics(totals);
            }, [meals]);

            const addFoodToMeal = useCallback((food) => {
                if (!selectedDay || !selectedMeal) return;
                const dateKey = getDateKey(selectedDay);
                setMeals(prev => ({
                    ...prev,
                    [dateKey]: {
                        ...prev[dateKey],
                        [selectedMeal]: [...(prev[dateKey]?.[selectedMeal] || []), { ...food, id: Date.now() }],
                    },
                }));
            }, [selectedDay, selectedMeal]);

            const removeFoodFromMeal = useCallback((dateKey, mealType, foodId) => {
                setMeals(prev => ({
                    ...prev,
                    [dateKey]: {
                        ...prev[dateKey],
                        [mealType]: prev[dateKey][mealType].filter(f => f.id !== foodId),
                    },
                }));
            }, []);

            const closeModal = useCallback(() => {
                setShowFoodSearch(false);
                setSelectedDay(null);
                setSelectedMeal(null);
            }, []);

            return (
                <div className={`min-h-screen transition-colors duration-300 ${darkMode ? 'bg-slate-900 text-white' : 'bg-white text-slate-900'}`}>
                    <Header user={user} darkMode={darkMode} onToggleDarkMode={() => setDarkMode(!darkMode)} />

                    <div className="max-w-7xl mx-auto px-4 py-6 space-y-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1 space-y-6">
                                <GreetingCard user={user} darkMode={darkMode} />
                                <NutritionCard metrics={healthMetrics} darkMode={darkMode} />
                                <HealthMetricsCard
                                    waterIntake={waterIntake}
                                    weight={weight}
                                    darkMode={darkMode}
                                    onWaterChange={handleWaterChange}
                                    onWeightChange={handleWeightChange}
                                />
                                <CalorieChart metrics={healthMetrics} darkMode={darkMode} />
                            </div>

                            <div className="lg:col-span-2 space-y-6">
                                <WeekNavigator currentWeekStart={currentWeekStart} onWeekChange={setCurrentWeekStart} darkMode={darkMode} />
                                <DietTable
                                    meals={meals}
                                    currentWeekStart={currentWeekStart}
                                    onSelectMeal={(day, mealType) => {
                                        setSelectedDay(day);
                                        setSelectedMeal(mealType);
                                        setShowFoodSearch(true);
                                    }}
                                    onRemoveFood={removeFoodFromMeal}
                                    darkMode={darkMode}
                                />
                            </div>
                        </div>

                        <ChartsSection meals={meals} currentWeekStart={currentWeekStart} darkMode={darkMode} />
                    </div>

                    {showFoodSearch && (
                        <FoodSearchModal
                            foods={FOOD_DATABASE}
                            onSelectFood={addFoodToMeal}
                            onClose={closeModal}
                            darkMode={darkMode}
                            selectedDay={selectedDay}
                            selectedMeal={selectedMeal}
                        />
                    )}
                </div>
            );
        }

        // ----------------------------------------------------------------------
        // HEADER
        // ----------------------------------------------------------------------
        function Header({ user, darkMode, onToggleDarkMode }) {
            return (
                <header className={`backdrop-blur-md border-b ${darkMode ? 'border-slate-700/50 bg-slate-800/50' : 'border-slate-200/50 bg-white/50'}`}>
                    <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-xl font-bold">
                                {user.avatar}
                            </div>
                            <div>
                                <h1 className="font-bold text-lg">NutriPlan</h1>
                                <p className={`text-xs ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>Meal Planning Made Smart</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button className={`p-2 rounded-lg transition-colors ${darkMode ? 'hover:bg-slate-700' : 'hover:bg-slate-100'}`} aria-label="Notifications">
                                <Bell size={20} />
                            </button>
                            <button onClick={onToggleDarkMode} className={`p-2 rounded-lg transition-colors ${darkMode ? 'hover:bg-slate-700' : 'hover:bg-slate-100'}`} aria-label="Toggle dark mode">
                                {darkMode ? <Sun size={20} /> : <Moon size={20} />}
                            </button>
                            <button className={`p-2 rounded-lg transition-colors ${darkMode ? 'hover:bg-slate-700' : 'hover:bg-slate-100'}`} aria-label="Settings">
                                <Settings size={20} />
                            </button>
                        </div>
                    </div>
                </header>
            );
        }

        // ----------------------------------------------------------------------
        // GREETING CARD
        // ----------------------------------------------------------------------
        function GreetingCard({ user, darkMode }) {
            const hour = new Date().getHours();
            const greeting = hour < 12 ? '🌅 Good Morning' : hour < 18 ? '🌤️ Good Afternoon' : '🌙 Good Evening';
            return (
                <div className={`rounded-3xl p-6 backdrop-blur-xl transition-all ${darkMode 
                    ? 'bg-gradient-to-br from-slate-700/60 to-slate-800/60 border border-slate-600/50' 
                    : 'bg-gradient-to-br from-blue-50 to-purple-50 border border-blue-200/50'}`}>
                    <p className={`text-sm mb-2 ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>{greeting}</p>
                    <h2 className="text-2xl font-bold mb-4">{user.name}</h2>
                    <p className={`text-sm ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                        {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
                    </p>
                </div>
            );
        }

        // ----------------------------------------------------------------------
        // NUTRITION CARD
        // ----------------------------------------------------------------------
        function NutritionCard({ metrics, darkMode }) {
            const target = { calories: 2000, protein: 150, carbs: 250, fat: 65, fiber: 30 };
            const percentage = Math.min((metrics.calories / target.calories) * 100, 100);

            return (
                <div className={`rounded-3xl p-6 backdrop-blur-xl transition-all ${darkMode 
                    ? 'bg-gradient-to-br from-emerald-500/20 to-teal-600/20 border border-emerald-500/30' 
                    : 'bg-gradient-to-br from-emerald-50 to-teal-50 border border-emerald-200/50'}`}>
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="font-bold flex items-center gap-2">
                            <Zap size={20} className="text-yellow-400" />
                            Today's Nutrition
                        </h3>
                    </div>
                    <div className="space-y-3">
                        <div>
                            <div className="flex justify-between mb-2">
                                <span className="text-sm font-medium">Calories</span>
                                <span className="text-sm font-bold">{Math.round(metrics.calories)} / {target.calories}</span>
                            </div>
                            <div className={`h-2 rounded-full overflow-hidden ${darkMode ? 'bg-slate-700' : 'bg-slate-200'}`}>
                                <div className="h-full bg-gradient-to-r from-yellow-400 to-red-500 transition-all" style={{ width: `${percentage}%` }} />
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-2 text-sm">
                            {[
                                ['Protein', 'protein', 'g'],
                                ['Carbs', 'carbs', 'g'],
                                ['Fat', 'fat', 'g'],
                                ['Fiber', 'fiber', 'g'],
                            ].map(([label, key, unit]) => (
                                <div key={key} className={`p-2 rounded-lg ${darkMode ? 'bg-slate-700/50' : 'bg-white/50'}`}>
                                    <p className={`text-xs ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>{label}</p>
                                    <p className="font-bold">{Math.round(metrics[key])}{unit}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ----------------------------------------------------------------------
        // HEALTH METRICS CARD (with NaN-safe weight)
        // ----------------------------------------------------------------------
        function HealthMetricsCard({ waterIntake, weight, darkMode, onWaterChange, onWeightChange }) {
            return (
                <div className={`rounded-3xl p-6 backdrop-blur-xl space-y-4 transition-all ${darkMode 
                    ? 'bg-gradient-to-br from-blue-500/20 to-cyan-600/20 border border-blue-500/30' 
                    : 'bg-gradient-to-br from-blue-50 to-cyan-50 border border-blue-200/50'}`}>
                    <div>
                        <h3 className="font-bold flex items-center gap-2 mb-3">
                            <Droplet size={20} className="text-blue-400" />
                            Water Intake
                        </h3>
                        <div className="flex gap-2">
                            {[...Array(8)].map((_, i) => (
                                <button
                                    key={i}
                                    onClick={() => onWaterChange(i + 1)}
                                    className={`flex-1 h-8 rounded-lg transition-all ${
                                        i < waterIntake
                                            ? 'bg-blue-500 hover:bg-blue-400'
                                            : darkMode ? 'bg-slate-700 hover:bg-slate-600' : 'bg-slate-200 hover:bg-slate-300'
                                    }`}
                                    aria-label={`Set water intake to ${i + 1} glass${i > 0 ? 'es' : ''}`}
                                />
                            ))}
                        </div>
                        <p className="text-sm mt-2">{waterIntake} / 8 glasses</p>
                    </div>

                    <div className={`border-t ${darkMode ? 'border-slate-700/50' : 'border-slate-200/50'} pt-4`}>
                        <h3 className="font-bold flex items-center gap-2 mb-3">
                            <TrendingUp size={20} className="text-pink-400" />
                            Weight
                        </h3>
                        <div className="flex items-center gap-2">
                            <input
                                type="number"
                                value={weight}
                                onChange={(e) => onWeightChange(e.target.value)}
                                className={`w-20 text-2xl font-bold bg-transparent border-b-2 ${darkMode ? 'border-blue-400 text-white' : 'border-blue-500 text-slate-900'} outline-none`}
                                min="1"
                                step="0.1"
                            />
                            <span className="text-xl">kg</span>
                        </div>
                        <p className="text-xs mt-1 opacity-60">BMI: {(weight / 1.75 / 1.75).toFixed(1)}</p>
                    </div>
                </div>
            );
        }

        // ----------------------------------------------------------------------
        // CALORIE CHART (empty state, no fake data)
        // ----------------------------------------------------------------------
        function CalorieChart({ metrics, darkMode }) {
            const total = metrics.protein + metrics.carbs + metrics.fat + metrics.fiber;
            const data = total > 0
                ? [
                    { name: 'Protein', value: metrics.protein },
                    { name: 'Carbs',   value: metrics.carbs },
                    { name: 'Fat',     value: metrics.fat },
                    { name: 'Fiber',   value: metrics.fiber },
                ]
                : [];
            const colors = ['#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];

            if (data.length === 0) {
                return (
                    <div className={`rounded-3xl p-6 backdrop-blur-xl transition-all ${darkMode 
                        ? 'bg-gradient-to-br from-purple-500/20 to-pink-600/20 border border-purple-500/30' 
                        : 'bg-gradient-to-br from-purple-50 to-pink-50 border border-purple-200/50'}`}>
                        <h3 className="font-bold mb-4">Macro Distribution</h3>
                        <p className={`text-center py-8 text-sm opacity-50 ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                            No macros logged today
                        </p>
                    </div>
                );
            }

            return (
                <div className={`rounded-3xl p-6 backdrop-blur-xl transition-all ${darkMode 
                    ? 'bg-gradient-to-br from-purple-500/20 to-pink-600/20 border border-purple-500/30' 
                    : 'bg-gradient-to-br from-purple-50 to-pink-50 border border-purple-200/50'}`}>
                    <h3 className="font-bold mb-4">Macro Distribution</h3>
                    <ResponsiveContainer width="100%" height={200}>
                        <PieChart>
                            <Pie data={data} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2} dataKey="value">
                                {data.map((_, index) => (
                                    <Cell key={`cell-${index}`} fill={colors[index]} />
                                ))}
                            </Pie>
                            <Tooltip formatter={(value) => `${value.toFixed(0)}g`} />
                        </PieChart>
                    </ResponsiveContainer>
                </div>
            );
        }

        // ----------------------------------------------------------------------
        // WEEK NAVIGATOR
        // ----------------------------------------------------------------------
        function WeekNavigator({ currentWeekStart, onWeekChange, darkMode }) {
            const weekEnd = new Date(currentWeekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);

            return (
                <div className={`rounded-3xl p-6 backdrop-blur-xl transition-all ${darkMode 
                    ? 'bg-gradient-to-r from-slate-700/60 to-slate-800/60 border border-slate-600/50' 
                    : 'bg-gradient-to-r from-slate-50 to-slate-100 border border-slate-200/50'}`}>
                    <div className="flex items-center justify-between">
                        <button
                            onClick={() => {
                                const newDate = new Date(currentWeekStart);
                                newDate.setDate(newDate.getDate() - 7);
                                onWeekChange(newDate);
                            }}
                            className={`p-2 rounded-lg transition-colors ${darkMode ? 'hover:bg-slate-600' : 'hover:bg-slate-200'}`}
                            aria-label="Previous week"
                        >
                            <ChevronLeft size={24} />
                        </button>
                        <div className="text-center">
                            <p className="text-sm opacity-60">Week of</p>
                            <p className="font-bold text-lg">
                                {currentWeekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} –{' '}
                                {weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                            </p>
                        </div>
                        <button
                            onClick={() => {
                                const newDate = new Date(currentWeekStart);
                                newDate.setDate(newDate.getDate() + 7);
                                onWeekChange(newDate);
                            }}
                            className={`p-2 rounded-lg transition-colors ${darkMode ? 'hover:bg-slate-600' : 'hover:bg-slate-200'}`}
                            aria-label="Next week"
                        >
                            <ChevronRight size={24} />
                        </button>
                    </div>
                </div>
            );
        }

        // ----------------------------------------------------------------------
        // DIET TABLE (with memoized rows and cells)
        // ----------------------------------------------------------------------
        const MealCell = React.memo(({ foods, onAdd, onRemove, darkMode }) => {
            return (
                <div className={`min-h-[110px] rounded-xl p-2 ${darkMode ? 'bg-slate-700/30' : 'bg-slate-50'} flex flex-col justify-between`}>
                    <div className="space-y-1 mb-2 overflow-y-auto max-h-20">
                        {foods.map(food => (
                            <div key={food.id} className={`text-xs p-1.5 rounded flex justify-between items-center gap-1 ${darkMode ? 'bg-slate-700/70' : 'bg-white border shadow-sm'}`}>
                                <span className="truncate block max-w-[100px]" title={`${food.emoji} ${food.name}`}>
                                    {food.emoji} {food.name}
                                </span>
                                <div className="flex items-center gap-1 shrink-0">
                                    <span className="opacity-60">{food.calories}k</span>
                                    <button onClick={() => onRemove(food.id)} className="text-red-400 hover:text-red-500 font-bold px-0.5" aria-label="Remove food">✕</button>
                                </div>
                            </div>
                        ))}
                    </div>
                    <button
                        onClick={onAdd}
                        className={`w-full py-1 rounded-lg flex items-center justify-center gap-1 text-xs font-medium transition-colors ${
                            darkMode ? 'bg-slate-700 hover:bg-slate-600 text-purple-400' : 'bg-white border hover:bg-slate-50 text-purple-600'
                        }`}
                    >
                        <Plus size={12} /> Add
                    </button>
                </div>
            );
        });

        function DietTable({ meals, currentWeekStart, onSelectMeal, onRemoveFood, darkMode }) {
            // Memoize the overall select/remove callbacks so they don't change on every render
            const stableOnSelect = useCallback((date, mealType) => {
                onSelectMeal(date, mealType);
            }, [onSelectMeal]);

            const stableOnRemove = useCallback((dateKey, mealType, foodId) => {
                onRemoveFood(dateKey, mealType, foodId);
            }, [onRemoveFood]);

            return (
                <div className={`rounded-3xl backdrop-blur-xl overflow-hidden border transition-all ${darkMode 
                    ? 'border-slate-600/50 bg-slate-800/30' 
                    : 'border-slate-200/50 bg-white/30'}`}>
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead>
                                <tr className={`border-b ${darkMode ? 'border-slate-600/50 bg-slate-700/50' : 'border-slate-200/50 bg-slate-100/50'}`}>
                                    <th className="px-6 py-4 text-left font-bold">Day</th>
                                    {MEAL_TYPES.map(meal => (
                                        <th key={meal} className="px-6 py-4 text-left font-bold">{meal}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {WEEK_DAYS.map((day, idx) => {
                                    const date = new Date(currentWeekStart);
                                    date.setDate(date.getDate() + idx);
                                    const dateKey = getDateKey(date);
                                    const isToday = dateKey === getDateKey(new Date());

                                    return (
                                        <DietTableRow
                                            key={day}
                                            day={day}
                                            date={date}
                                            dateKey={dateKey}
                                            isToday={isToday}
                                            meals={meals}
                                            darkMode={darkMode}
                                            onSelectMeal={stableOnSelect}
                                            onRemoveFood={stableOnRemove}
                                        />
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const DietTableRow = React.memo(({ day, date, dateKey, isToday, meals, darkMode, onSelectMeal, onRemoveFood }) => {
            // Create stable callbacks per row using useCallback – but since the outer callbacks are stable, we can just pass them directly
            // The cell's onAdd and onRemove need to capture dateKey and mealType. We'll create memoized wrappers using useCallback.
            const createAddHandler = useCallback((mealType) => () => onSelectMeal(date, mealType), [onSelectMeal, date]);
            const createRemoveHandler = useCallback((mealType) => (foodId) => onRemoveFood(dateKey, mealType, foodId), [onRemoveFood, dateKey]);

            return (
                <tr
                    className={`border-b transition-colors ${
                        isToday
                            ? darkMode ? 'bg-purple-500/20' : 'bg-purple-50'
                            : darkMode ? 'hover:bg-slate-700/30' : 'hover:bg-slate-50'
                    } ${darkMode ? 'border-slate-600/50' : 'border-slate-200/50'}`}
                >
                    <td className={`px-6 py-4 font-bold ${isToday ? 'text-purple-400' : ''}`}>
                        <div>
                            <p>{day}</p>
                            <p className="text-xs opacity-60">{date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</p>
                        </div>
                    </td>
                    {MEAL_TYPES.map(mealType => (
                        <td key={mealType} className="px-6 py-4 min-w-[160px]">
                            <MealCell
                                foods={meals[dateKey]?.[mealType] || []}
                                onAdd={createAddHandler(mealType)}
                                onRemove={createRemoveHandler(mealType)}
                                darkMode={darkMode}
                            />
                        </td>
                    ))}
                </tr>
            );
        });

        // ----------------------------------------------------------------------
        // FOOD SEARCH MODAL (with full a11y)
        // ----------------------------------------------------------------------
        function FoodSearchModal({ foods, onSelectFood, onClose, darkMode, selectedDay, selectedMeal }) {
            const [search, setSearch] = useState('');
            const [filtered, setFiltered] = useState(foods);
            const modalRef = useRef(null);
            const closeButtonRef = useRef(null);

            // ESC key listener
            useEffect(() => {
                const handleKeyDown = (e) => e.key === 'Escape' && onClose();
                document.addEventListener('keydown', handleKeyDown);
                return () => document.removeEventListener('keydown', handleKeyDown);
            }, [onClose]);

            // Focus trap inside modal
            useEffect(() => {
                const handleTab = (e) => {
                    if (!modalRef.current?.contains(e.target)) return;
                    const focusable = modalRef.current.querySelectorAll(
                        'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
                    );
                    if (focusable.length === 0) return;
                    const first = focusable[0];
                    const last = focusable[focusable.length - 1];
                    if (e.shiftKey && document.activeElement === first) {
                        last.focus(); e.preventDefault();
                    } else if (!e.shiftKey && document.activeElement === last) {
                        first.focus(); e.preventDefault();
                    }
                };
                document.addEventListener('keydown', handleTab);
                return () => document.removeEventListener('keydown', handleTab);
            }, []);

            // Auto-focus close button on mount
            useEffect(() => {
                closeButtonRef.current?.focus();
            }, []);

            useEffect(() => {
                const q = search.toLowerCase();
                setFiltered(foods.filter(f => f.name.toLowerCase().includes(q)));
            }, [search, foods]);

            const formattedDate = selectedDay
                ? selectedDay.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })
                : '';

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div
                        ref={modalRef}
                        className={`rounded-3xl w-full max-w-2xl max-h-[80vh] overflow-hidden flex flex-col ${darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}`}
                        onClick={(e) => e.stopPropagation()}
                        role="dialog"
                        aria-modal="true"
                        aria-labelledby="modal-title"
                    >
                        <div className={`p-6 border-b ${darkMode ? 'border-slate-700' : 'border-slate-200'}`}>
                            <div className="flex items-center justify-between mb-2">
                                <h2 id="modal-title" className="text-2xl font-bold">Add Food</h2>
                                <button ref={closeButtonRef} onClick={onClose} className="text-xl opacity-60 hover:opacity-100" aria-label="Close modal">✕</button>
                            </div>
                            <p className={`text-sm ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                                {formattedDate} — {selectedMeal}
                            </p>
                            <div className={`mt-4 flex items-center gap-2 px-3 py-2 rounded-xl border ${darkMode ? 'bg-slate-700 border-slate-600' : 'bg-slate-50 border-slate-200'}`}>
                                <Search size={18} className="opacity-60" />
                                <input
                                    type="text"
                                    placeholder="Search foods…"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="flex-1 bg-transparent outline-none text-sm"
                                />
                            </div>
                        </div>
                        <div className="overflow-y-auto p-4 flex-1">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                {filtered.map(food => (
                                    <button
                                        key={food.id}
                                        onClick={() => { onSelectFood(food); onClose(); }}
                                        className={`text-left p-3 rounded-xl transition-all border ${darkMode ? 'bg-slate-700/40 border-slate-700 hover:bg-slate-700' : 'bg-slate-50 border-slate-100 hover:bg-slate-100'}`}
                                    >
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <p className="font-semibold text-sm">{food.emoji} {food.name}</p>
                                                <p className="text-xs opacity-60">{food.calories} kcal</p>
                                                <p className="text-[10px] opacity-40 mt-0.5">
                                                    P: {food.protein}g | C: {food.carbs}g | F: {food.fat}g
                                                </p>
                                            </div>
                                            <Plus size={16} className="text-purple-500" />
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ----------------------------------------------------------------------
        // CHARTS SECTION (with useMemo)
        // ----------------------------------------------------------------------
        function ChartsSection({ meals, currentWeekStart, darkMode }) {
            const { weekData, nutritionData } = useMemo(() => {
                const weekData = [];
                const nutritionData = [];
                for (let i = 0; i < 7; i++) {
                    const date = new Date(currentWeekStart);
                    date.setDate(date.getDate() + i);
                    const dateKey = getDateKey(date);
                    const dayMeals = meals[dateKey] || {};
                    let cals = 0, protein = 0, carbs = 0, fat = 0;
                    Object.values(dayMeals).forEach(meal => {
                        if (Array.isArray(meal)) {
                            meal.forEach(food => {
                                cals += food.calories || 0;
                                protein += food.protein || 0;
                                carbs  += food.carbs  || 0;
                                fat   += food.fat    || 0;
                            });
                        }
                    });
                    const dayName = WEEK_DAYS[i].substring(0, 3);
                    weekData.push({ day: dayName, calories: Math.round(cals) });
                    nutritionData.push({ day: dayName, protein: Math.round(protein), carbs: Math.round(carbs), fat: Math.round(fat) });
                }
                return { weekData, nutritionData };
            }, [meals, currentWeekStart]);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className={`rounded-3xl p-6 border ${darkMode ? 'bg-slate-800/60 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>
                        <h3 className="font-bold mb-4">Weekly Calories</h3>
                        <ResponsiveContainer width="100%" height={260}>
                            <LineChart data={weekData}>
                                <CartesianGrid strokeDasharray="3 3" stroke={darkMode ? '#475569' : '#e2e8f0'} />
                                <XAxis dataKey="day" stroke={darkMode ? '#94a3b8' : '#64748b'} />
                                <YAxis stroke={darkMode ? '#94a3b8' : '#64748b'} />
                                <Tooltip contentStyle={{ backgroundColor: darkMode ? '#1e293b' : '#fff', border: 'none', borderRadius: '8px' }} />
                                <Legend />
                                <Line type="monotone" dataKey="calories" stroke="#8b5cf6" strokeWidth={3} dot={{ fill: '#8b5cf6' }} />
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                    <div className={`rounded-3xl p-6 border ${darkMode ? 'bg-slate-800/60 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>
                        <h3 className="font-bold mb-4">Weekly Macros</h3>
                        <ResponsiveContainer width="100%" height={260}>
                            <BarChart data={nutritionData}>
                                <CartesianGrid strokeDasharray="3 3" stroke={darkMode ? '#475569' : '#e2e8f0'} />
                                <XAxis dataKey="day" stroke={darkMode ? '#94a3b8' : '#64748b'} />
                                <YAxis stroke={darkMode ? '#94a3b8' : '#64748b'} />
                                <Tooltip contentStyle={{ backgroundColor: darkMode ? '#1e293b' : '#fff', border: 'none', borderRadius: '8px' }} />
                                <Legend />
                                <Bar dataKey="protein" fill="#8b5cf6" radius={[4, 4, 0, 0]} />
                                <Bar dataKey="carbs"   fill="#ec4899" radius={[4, 4, 0, 0]} />
                                <Bar dataKey="fat"     fill="#f59e0b" radius={[4, 4, 0, 0]} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DietPlannerApp />);
    </script>
</body>
</html>
