<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Meal Planner Pro</title>

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" id="manifestLink" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ───────────── CSS VARIABLES (LIGHT default) ───────────── */
        :root {
            --bg-body: #f5f7fb;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-light: #f1f5f9;
            --border-medium: #e2e8f0;
            --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.04);
            --shadow-card-hover: 0 12px 32px rgba(0, 0, 0, 0.07);
            --shadow-btn: 0 1px 3px rgba(0, 0, 0, 0.06);
            --badge-bg: #f1f5f9;
            --badge-text: #475569;
            --input-bg: #fafbfc;
            --input-border: #e2e8f0;
            --modal-overlay: rgba(15, 23, 42, 0.50);
            --stat-bg: #ffffff;
            --stat-icon-blue: #3b82f6;
            --stat-icon-green: #22c55e;
            --stat-icon-orange: #f59e0b;
            --stat-icon-purple: #8b5cf6;
            --meal-item-bg: #f8fafc;
            --meal-item-hover: #f1f5f9;
            --empty-text: #cbd5e1;
            --add-btn-color: #3b82f6;
            --add-btn-hover: #2563eb;
            --delete-btn-hover-bg: #fee2e2;
            --delete-btn-hover-color: #ef4444;
            --auth-bg: #ffffff;
            --auth-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        /* ───────────── DARK THEME ───────────── */
        body.dark-theme {
            --bg-body: #0b0e14;
            --bg-card: #1a1f2b;
            --bg-card-hover: #232a38;
            --text-primary: #e9edf4;
            --text-secondary: #b0b9cc;
            --text-muted: #6b7a93;
            --border-light: #2a3140;
            --border-medium: #3a4356;
            --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.25);
            --shadow-card-hover: 0 12px 32px rgba(0, 0, 0, 0.40);
            --shadow-btn: 0 1px 3px rgba(0, 0, 0, 0.25);
            --badge-bg: #2a3140;
            --badge-text: #b0b9cc;
            --input-bg: #232a38;
            --input-border: #3a4356;
            --modal-overlay: rgba(0, 0, 0, 0.70);
            --stat-bg: #1a1f2b;
            --meal-item-bg: #232a38;
            --meal-item-hover: #2a3140;
            --empty-text: #4a5568;
            --add-btn-color: #60a5fa;
            --add-btn-hover: #93bbfc;
            --delete-btn-hover-bg: #3b1e1e;
            --delete-btn-hover-color: #f87171;
            --auth-bg: #1a1f2b;
            --auth-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* ───────────── RESET & BASE ───────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s, color 0.3s;
        }

        .app-wrapper {
            max-width: 1280px;
            width: 100%;
            padding: 24px 16px 40px;
        }

        /* ───────────── AUTH OVERLAY ───────────── */
        #authContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            transition: background 0.3s;
        }
        #authContainer.hidden {
            display: none;
        }

        .auth-box {
            background: var(--auth-bg);
            border-radius: 32px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--auth-shadow);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .auth-box h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .auth-box .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .auth-box .form-group {
            margin-bottom: 16px;
        }

        .auth-box .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .auth-box .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--input-border);
            border-radius: 14px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }

        .auth-box .form-group input:focus {
            outline: none;
            border-color: var(--stat-icon-blue);
        }

        .auth-box .btn {
            width: 100%;
            justify-content: center;
            padding: 12px;
            font-size: 16px;
        }

        .auth-box .auth-switch {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-box .auth-switch a {
            color: var(--stat-icon-blue);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-box .auth-switch a:hover {
            text-decoration: underline;
        }

        .auth-error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        /* ───────────── HEADER (with auth) ───────────── */
        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            gap: 16px;
        }

        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .app-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            display: inline-block;
            flex-shrink: 0;
            border: 2px solid rgba(59, 130, 246, 0.20);
            transition: border-color 0.3s;
        }
        .app-logo:hover {
            border-color: var(--stat-icon-blue);
        }
        body.dark-theme .app-logo {
            border-color: rgba(96, 165, 250, 0.25);
        }
        body.dark-theme .app-logo:hover {
            border-color: #60a5fa;
        }

        .app-header h1 i {
            color: var(--stat-icon-blue);
            font-size: 30px;
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .header-actions .date-badge {
            background: var(--bg-card);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-btn);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            transition: background 0.3s, color 0.3s;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow-btn);
        }

        .btn-primary {
            background: var(--stat-icon-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.40);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-medium);
            box-shadow: none;
        }
        .btn-outline:hover {
            border-color: var(--text-muted);
            background: var(--meal-item-hover);
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }
        .btn-success:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        .btn-theme {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 2px solid var(--border-medium);
            border-radius: 100px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-btn);
        }
        .btn-theme:hover {
            border-color: var(--text-muted);
            background: var(--meal-item-hover);
        }

        .pro-badge {
            background: #f59e0b;
            color: #1e293b;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 100px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        /* Install button – always visible by default, hidden if installed */
        #installBtn {
            display: inline-flex;
        }

        /* ───────────── STATS BAR ───────────── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            background: var(--stat-bg);
            border-radius: 20px;
            padding: 18px 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-card);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-item .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .stat-item .icon.blue {
            background: var(--stat-icon-blue);
        }
        .stat-item .icon.green {
            background: var(--stat-icon-green);
        }
        .stat-item .icon.purple {
            background: var(--stat-icon-purple);
        }

        .stat-item .info .label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .stat-item .info .value {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text-primary);
        }

        /* ───────────── DAY GRID ───────────── */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* ───────────── DAY CARD ───────────── */
        .day-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s;
        }

        .day-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-card-hover);
        }

        .day-card .day-header {
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-light);
        }

        .day-card .day-header .day-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: var(--text-primary);
        }

        .day-card .day-header .day-name span {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 13px;
            margin-left: 6px;
        }

        .day-card .day-header .day-total {
            font-size: 13px;
            font-weight: 600;
            color: var(--badge-text);
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 100px;
            transition: background 0.3s, color 0.3s;
        }

        .day-card .meal-section {
            padding: 12px 20px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .day-card .meal-section:last-of-type {
            border-bottom: none;
        }

        .day-card .meal-section .meal-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 8px;
        }

        .day-card .meal-section .meal-label i {
            font-size: 14px;
            color: var(--text-muted);
        }

        .meal-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--meal-item-bg);
            padding: 10px 14px;
            border-radius: 14px;
            margin-bottom: 6px;
            transition: background 0.15s, background 0.3s;
            gap: 10px;
        }

        .meal-item:last-child {
            margin-bottom: 0;
        }
        .meal-item:hover {
            background: var(--meal-item-hover);
        }

        .meal-item .meal-info {
            flex: 1;
            min-width: 0;
        }

        .meal-item .meal-info .meal-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meal-item .meal-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .meal-item .meal-actions button {
            background: transparent;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.15s;
            font-size: 13px;
        }

        .meal-item .meal-actions button:hover {
            background: var(--meal-item-hover);
            color: var(--text-primary);
        }

        .meal-item .meal-actions .delete-btn:hover {
            background: var(--delete-btn-hover-bg);
            color: var(--delete-btn-hover-color);
        }

        .empty-meal {
            font-size: 13px;
            color: var(--empty-text);
            padding: 6px 0 4px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .add-meal-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--add-btn-color);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 0;
            margin-top: 4px;
            transition: color 0.15s;
        }
        .add-meal-btn:hover {
            color: var(--add-btn-hover);
        }

        /* ───────────── MODAL ───────────── */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--modal-overlay);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px 36px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.20);
            transition: background 0.3s;
        }

        .modal .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .modal .modal-sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 22px;
        }

        .modal .form-group {
            margin-bottom: 18px;
        }

        .modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .modal .form-group input,
        .modal .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--input-border);
            border-radius: 14px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, background 0.3s, color 0.3s;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .modal .form-group input:focus,
        .modal .form-group select:focus {
            outline: none;
            border-color: var(--stat-icon-blue);
            background: var(--bg-card);
        }

        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .modal .modal-actions .btn {
            flex: 1;
            justify-content: center;
        }

        /* ───────────── RESPONSIVE ───────────── */
        @media (max-width: 768px) {
            .app-header h1 {
                font-size: 22px;
            }
            .app-logo {
                width: 32px;
                height: 32px;
            }
            .stats-bar {
                grid-template-columns: 1fr 1fr;
                padding: 14px 18px;
                gap: 10px;
            }
            .stat-item .info .value {
                font-size: 17px;
            }
            .week-grid {
                grid-template-columns: 1fr;
            }
            .modal {
                padding: 24px 20px;
            }
            .header-actions .date-badge {
                font-size: 12px;
                padding: 6px 14px;
            }
            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
            .auth-box {
                padding: 32px 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            .app-wrapper {
                padding: 12px 8px 30px;
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .app-logo {
                width: 28px;
                height: 28px;
            }
            .header-actions {
                justify-content: space-between;
                flex-wrap: wrap;
            }
            .stats-bar {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                padding: 12px 14px;
            }
            .day-card .day-header {
                padding: 14px 16px 10px;
            }
            .day-card .meal-section {
                padding: 10px 16px 14px;
            }
            .meal-item {
                padding: 8px 12px;
            }
            .modal .modal-actions {
                flex-direction: column;
            }
            .auth-box {
                padding: 24px 16px;
            }
        }

        /* ───────────── SCROLLBAR ───────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--badge-bg);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- ─── AUTH CONTAINER ─── -->
    <div id="authContainer">
        <div class="auth-box" id="authBox">
            <h2 id="authTitle">Welcome</h2>
            <div class="sub" id="authSub">Sign in to manage your meals</div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label for="authName">Full Name</label>
                    <input type="text" id="authName" placeholder="Your name" />
                </div>
                <div class="form-group">
                    <label for="authUser">Username</label>
                    <input type="text" id="authUser" placeholder="Choose a username" required />
                </div>
                <div class="form-group">
                    <label for="authPass">Password</label>
                    <input type="password" id="authPass" placeholder="••••••••" required />
                </div>
                <div class="auth-error" id="authError">Invalid credentials</div>
                <button type="submit" class="btn btn-primary" id="authSubmitBtn">Sign In</button>
            </form>

            <div class="auth-switch">
                <span id="authSwitchText">Don't have an account?</span>
                <a id="authSwitchLink">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- ─── APP CONTAINER (hidden until auth) ─── -->
    <div class="app-wrapper" id="appContainer" style="display:none;">

        <!-- ─── HEADER ─── -->
        <header class="app-header">
            <h1>
                <img
                src="https://i.ibb.co/gLXWj0Tn/c8a71cc8d8bc8e067883b4c4f4d184b0.jpg"
                alt="Meal Planner Logo"
                class="app-logo"
                />
                Meal Planner <span id="proBadge" class="pro-badge" style="display:none; font-size:12px; margin-left:8px;">PRO</span>
            </h1>
            <div class="header-actions">
                <span class="date-badge">
                    <i class="far fa-calendar-alt"></i>
                    <span id="currentWeekLabel">Week of Apr 6</span>
                </span>
                <button class="btn btn-primary" onclick="openModal()">
                    <i class="fas fa-plus"></i> Add Meal
                </button>
                <button class="btn btn-outline" onclick="resetAll()" title="Clear all meals">
                    <i class="fas fa-trash-alt"></i> Reset
                </button>
                <button class="btn btn-outline" onclick="upgradePro()" id="upgradeBtn" title="Upgrade to Pro">
                    <i class="fas fa-crown"></i> Pro
                </button>
                <!-- INSTALL BUTTON – always visible, auto-hidden if installed -->
                <button class="btn btn-success" id="installBtn" onclick="installApp()" title="Install App">
                    <i class="fas fa-download"></i> Install
                </button>
                <button class="btn btn-outline" onclick="logout()" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
                <button class="btn-theme" id="themeToggle" title="Toggle dark/light theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <!-- ─── STATS ─── -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="icon blue"><i class="fas fa-utensils"></i></div>
                <div class="info">
                    <div class="label">Total Meals</div>
                    <div class="value" id="totalMeals">0</div>
                </div>
            </div>
            <div class="stat-item">
                <div class="icon green"><i class="fas fa-calendar-check"></i></div>
                <div class="info">
                    <div class="label">Days Planned</div>
                    <div class="value" id="daysPlanned">0</div>
                </div>
            </div>
            <div class="stat-item">
                <div class="icon purple"><i class="fas fa-list-check"></i></div>
                <div class="info">
                    <div class="label">Completion</div>
                    <div class="value" id="completionPct">0%</div>
                </div>
            </div>
        </div>

        <!-- ─── WEEK GRID ─── -->
        <div class="week-grid" id="weekGrid"></div>
    </div>

    <!-- ─── MODAL (Add/Edit Meal) ─── -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Add Meal</div>
            <div class="modal-sub" id="modalSub">Fill in the details for your meal.</div>
            <form id="mealForm" onsubmit="saveMeal(event)">
                <div class="form-group">
                    <label for="mealDay">Day</label>
                    <select id="mealDay" required>
                        <option value="sunday">Sunday</option>
                        <option value="monday">Monday</option>
                        <option value="tuesday">Tuesday</option>
                        <option value="wednesday">Wednesday</option>
                        <option value="thursday">Thursday</option>
                        <option value="friday">Friday</option>
                        <option value="saturday">Saturday</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="mealType">Meal</label>
                    <select id="mealType" required>
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="mealName">Meal Name</label>
                    <input type="text" id="mealName" placeholder="e.g. Avocado Toast" required />
                </div>
                <input type="hidden" id="editIndex" value="-1" />
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modalSubmitBtn">
                        <i class="fas fa-save"></i> Save Meal
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────────
        //  AUTH SYSTEM
        // ─────────────────────────────────────────────────────────────
        const AUTH_KEY = 'mealPlannerAuth';
        const USERS_KEY = 'mealPlannerUsers';

        function getUsers() {
            return JSON.parse(localStorage.getItem(USERS_KEY)) || {};
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function getSession() {
            return JSON.parse(localStorage.getItem(AUTH_KEY));
        }

        function setSession(username) {
            localStorage.setItem(AUTH_KEY, JSON.stringify({ username }));
        }

        function clearSession() {
            localStorage.removeItem(AUTH_KEY);
        }

        function getCurrentUser() {
            const session = getSession();
            if (!session) return null;
            const users = getUsers();
            return users[session.username] || null;
        }

        // Auth UI elements
        const authContainer = document.getElementById('authContainer');
        const appContainer = document.getElementById('appContainer');
        const authForm = document.getElementById('authForm');
        const authTitle = document.getElementById('authTitle');
        const authSub = document.getElementById('authSub');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authSwitchText = document.getElementById('authSwitchText');
        const authSwitchLink = document.getElementById('authSwitchLink');
        const authError = document.getElementById('authError');
        const nameGroup = document.getElementById('nameGroup');
        const authName = document.getElementById('authName');
        const authUser = document.getElementById('authUser');
        const authPass = document.getElementById('authPass');

        let isLogin = true;

        function toggleAuthMode() {
            isLogin = !isLogin;
            if (isLogin) {
                authTitle.textContent = 'Welcome';
                authSub.textContent = 'Sign in to manage your meals';
                authSubmitBtn.innerHTML = 'Sign In';
                authSwitchText.textContent = "Don't have an account?";
                authSwitchLink.textContent = 'Sign Up';
                nameGroup.style.display = 'none';
                authName.removeAttribute('required');
            } else {
                authTitle.textContent = 'Create Account';
                authSub.textContent = 'Join and start planning your meals';
                authSubmitBtn.innerHTML = 'Sign Up';
                authSwitchText.textContent = 'Already have an account?';
                authSwitchLink.textContent = 'Sign In';
                nameGroup.style.display = 'block';
                authName.setAttribute('required', 'required');
            }
            authError.style.display = 'none';
        }

        authSwitchLink.addEventListener('click', toggleAuthMode);

        function handleAuth(e) {
            e.preventDefault();
            authError.style.display = 'none';

            const username = authUser.value.trim();
            const password = authPass.value.trim();
            const name = authName.value.trim();

            if (!username || !password) {
                authError.textContent = 'Please fill in all fields.';
                authError.style.display = 'block';
                return;
            }

            const users = getUsers();

            if (isLogin) {
                if (users[username] && users[username].password === password) {
                    setSession(username);
                    showApp();
                } else {
                    authError.textContent = 'Invalid username or password.';
                    authError.style.display = 'block';
                }
            } else {
                if (users[username]) {
                    authError.textContent = 'Username already taken.';
                    authError.style.display = 'block';
                    return;
                }
                if (!name) {
                    authError.textContent = 'Please enter your full name.';
                    authError.style.display = 'block';
                    return;
                }
                users[username] = {
                    name: name,
                    password: password,
                    pro: false
                };
                saveUsers(users);
                setSession(username);
                showApp();
            }
        }

        function showApp() {
            authContainer.classList.add('hidden');
            appContainer.style.display = 'block';
            initUserData();
            render();
            updateProUI();
            checkInstallability();
        }

        function logout() {
            clearSession();
            appContainer.style.display = 'none';
            authContainer.classList.remove('hidden');
            authForm.reset();
            authError.style.display = 'none';
            isLogin = true;
            toggleAuthMode();
        }

        function upgradePro() {
            const user = getCurrentUser();
            if (!user) return;
            if (user.pro) {
                alert('You are already a Pro user! 🎉');
                return;
            }
            const users = getUsers();
            const session = getSession();
            if (session) {
                users[session.username].pro = true;
                saveUsers(users);
                updateProUI();
                alert('You are now a Pro user! 🎉');
                render();
            }
        }

        function updateProUI() {
            const user = getCurrentUser();
            const badge = document.getElementById('proBadge');
            const upgradeBtn = document.getElementById('upgradeBtn');
            if (user && user.pro) {
                badge.style.display = 'inline';
                upgradeBtn.innerHTML = '<i class="fas fa-crown"></i> Pro ✓';
                upgradeBtn.disabled = true;
                upgradeBtn.style.opacity = '0.6';
            } else {
                badge.style.display = 'none';
                upgradeBtn.innerHTML = '<i class="fas fa-crown"></i> Pro';
                upgradeBtn.disabled = false;
                upgradeBtn.style.opacity = '1';
            }
        }

        // ─────────────────────────────────────────────────────────────
        //  MEAL PLANNER DATA (per user)
        // ─────────────────────────────────────────────────────────────
        const DAYS = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const DAY_LABELS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const MEAL_TYPES = ['breakfast', 'lunch', 'dinner'];
        const MEAL_LABELS = { breakfast: 'Breakfast', lunch: 'Lunch', dinner: 'Dinner' };
        const MEAL_ICONS = { breakfast: 'fa-sun', lunch: 'fa-cloud-sun', dinner: 'fa-moon' };
        const MEAL_EMOJIS = { breakfast: '🍳', lunch: '🥗', dinner: '🍝' };

        const DEFAULT_DATA = {
            sunday: { breakfast: [{ name: 'Avocado Toast' }], lunch: [{ name: 'Quinoa Salad' }], dinner: [{ name: 'Grilled Chicken' }] },
            monday: { breakfast: [{ name: 'Oatmeal with Berries' }], lunch: [{ name: 'Turkey Sandwich' }], dinner: [{ name: 'Salmon with Veggies' }] },
            tuesday: { breakfast: [{ name: 'Greek Yogurt Parfait' }], lunch: [{ name: 'Chicken Caesar Wrap' }], dinner: [{ name: 'Pasta Primavera' }] },
            wednesday: { breakfast: [{ name: 'Smoothie Bowl' }], lunch: [{ name: 'Mediterranean Plate' }], dinner: [{ name: 'Beef Stir-fry' }] },
            thursday: { breakfast: [{ name: 'Eggs & Toast' }], lunch: [{ name: 'Tuna Salad' }], dinner: [{ name: 'Vegetable Curry' }] },
            friday: { breakfast: [{ name: 'Pancakes with Syrup' }], lunch: [{ name: 'Caprese Sandwich' }], dinner: [{ name: 'Fish Tacos' }] },
            saturday: { breakfast: [{ name: 'Fruit & Granola' }], lunch: [{ name: 'Hummus Wrap' }], dinner: [{ name: 'Pizza Margherita' }] }
        };

        let mealData = {};

        function getUserDataKey() {
            const session = getSession();
            if (!session) return null;
            return 'mealPlannerData_' + session.username;
        }

        function initUserData() {
            const key = getUserDataKey();
            if (!key) return;
            const stored = localStorage.getItem(key);
            if (stored) {
                mealData = JSON.parse(stored);
                DAYS.forEach(day => {
                    if (!mealData[day]) mealData[day] = {};
                    MEAL_TYPES.forEach(type => {
                        if (!mealData[day][type]) mealData[day][type] = [];
                    });
                });
            } else {
                mealData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                localStorage.setItem(key, JSON.stringify(mealData));
            }
        }

        function saveUserData() {
            const key = getUserDataKey();
            if (key) {
                localStorage.setItem(key, JSON.stringify(mealData));
            }
        }

        // ─────────────────────────────────────────────────────────────
        //  RENDER
        // ─────────────────────────────────────────────────────────────
        function render() {
            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';

            let totalMeals = 0;
            let daysWithMeals = 0;

            DAYS.forEach((day, idx) => {
                const dayData = mealData[day] || {};
                const card = document.createElement('div');
                card.className = 'day-card';

                const dayTotal = countMeals(dayData);
                totalMeals += dayTotal;
                if (dayTotal > 0) daysWithMeals++;

                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerHTML = `
                            <div class="day-name">${DAY_LABELS[idx]} <span>${dayTotal} meals</span></div>
                            <div class="day-total">${dayTotal} items</div>
                        `;
                card.appendChild(header);

                MEAL_TYPES.forEach((type) => {
                    const section = document.createElement('div');
                    section.className = 'meal-section';

                    const meals = dayData[type] || [];
                    const label = MEAL_LABELS[type];
                    const icon = MEAL_ICONS[type];
                    const emoji = MEAL_EMOJIS[type];

                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'meal-label';
                    labelDiv.innerHTML = `<i class="fas ${icon}"></i> ${label}`;
                    section.appendChild(labelDiv);

                    if (meals.length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'empty-meal';
                        empty.innerHTML = `${emoji} No meals added yet`;
                        section.appendChild(empty);
                    } else {
                        meals.forEach((meal, mi) => {
                            const item = document.createElement('div');
                            item.className = 'meal-item';
                            item.innerHTML = `
                                        <div class="meal-info"><div class="meal-name">${escapeHtml(meal.name)}</div></div>
                                        <div class="meal-actions">
                                            <button class="edit-btn" onclick="editMeal('${day}','${type}',${mi})" title="Edit"><i class="fas fa-pen"></i></button>
                                            <button class="delete-btn" onclick="deleteMeal('${day}','${type}',${mi})" title="Delete"><i class="fas fa-trash-can"></i></button>
                                        </div>
                                    `;
                            section.appendChild(item);
                        });
                    }

                    const addBtn = document.createElement('button');
                    addBtn.className = 'add-meal-btn';
                    addBtn.innerHTML = `<i class="fas fa-plus-circle"></i> Add ${label}`;
                    addBtn.onclick = () => openModal(day, type);
                    section.appendChild(addBtn);

                    card.appendChild(section);
                });

                grid.appendChild(card);
            });

            document.getElementById('totalMeals').textContent = totalMeals;
            document.getElementById('daysPlanned').textContent = daysWithMeals;

            const totalSlots = 21;
            let filledSlots = 0;
            DAYS.forEach(d => {
                MEAL_TYPES.forEach(t => {
                    if ((mealData[d] && mealData[d][t] && mealData[d][t].length) > 0) filledSlots++;
                });
            });
            const pct = Math.round((filledSlots / totalSlots) * 100);
            document.getElementById('completionPct').textContent = pct + '%';

            const now = new Date();
            const start = new Date(now);
            start.setDate(now.getDate() - now.getDay());
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            document.getElementById('currentWeekLabel').textContent = `Week of ${fmt(start)} – ${fmt(end)}`;

            saveUserData();
        }

        function countMeals(day) {
            let n = 0;
            MEAL_TYPES.forEach(t => { n += (day[t] || []).length; });
            return n;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ─────────────────────────────────────────────────────────────
        //  MODAL
        // ─────────────────────────────────────────────────────────────
        function openModal(day, type) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('mealForm').reset();
            document.getElementById('editIndex').value = -1;
            document.getElementById('modalTitle').textContent = 'Add Meal';
            document.getElementById('modalSub').textContent = 'Fill in the details for your meal.';
            document.getElementById('modalSubmitBtn').innerHTML = '<i class="fas fa-save"></i> Save Meal';
            if (day) document.getElementById('mealDay').value = day;
            if (type) document.getElementById('mealType').value = type;
            overlay.classList.add('active');
            document.getElementById('mealName').focus();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('editIndex').value = -1;
        }

        function editMeal(day, type, index) {
            const meals = mealData[day] && mealData[day][type] || [];
            if (index < 0 || index >= meals.length) return;
            const meal = meals[index];
            document.getElementById('mealDay').value = day;
            document.getElementById('mealType').value = type;
            document.getElementById('mealName').value = meal.name || '';
            document.getElementById('editIndex').value = index;
            document.getElementById('modalTitle').textContent = 'Edit Meal';
            document.getElementById('modalSub').textContent = 'Update your meal details.';
            document.getElementById('modalSubmitBtn').innerHTML = '<i class="fas fa-pen"></i> Update Meal';
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('mealName').focus();
        }

        function saveMeal(e) {
            e.preventDefault();
            const day = document.getElementById('mealDay').value;
            const type = document.getElementById('mealType').value;
            const name = document.getElementById('mealName').value.trim();
            const editIdx = parseInt(document.getElementById('editIndex').value);

            if (!name) { alert('Please enter a meal name.'); return; }

            if (!mealData[day]) mealData[day] = {};
            if (!mealData[day][type]) mealData[day][type] = [];

            const newMeal = { name };

            if (editIdx >= 0 && editIdx < mealData[day][type].length) {
                mealData[day][type][editIdx] = newMeal;
            } else {
                mealData[day][type].push(newMeal);
            }

            closeModal();
            render();
        }

        function deleteMeal(day, type, index) {
            if (!confirm('Delete this meal?')) return;
            const meals = mealData[day] && mealData[day][type] || [];
            if (index >= 0 && index < meals.length) {
                meals.splice(index, 1);
                render();
            }
        }

        function resetAll() {
            if (!confirm('Clear all meals and reset to default examples?')) return;
            mealData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            render();
        }

        // ─────────────────────────────────────────────────────────────
        //  THEME TOGGLE
        // ─────────────────────────────────────────────────────────────
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const savedTheme = localStorage.getItem('mealPlannerTheme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeIcon.className = 'fas fa-sun';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('mealPlannerTheme', isDark ? 'dark' : 'light');
        });

        // ─────────────────────────────────────────────────────────────
        //  CLOSE MODAL ON OVERLAY CLICK & ESC
        // ─────────────────────────────────────────────────────────────
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ─────────────────────────────────────────────────────────────
        //  PWA: INSTALL BUTTON & SERVICE WORKER
        // ─────────────────────────────────────────────────────────────
        let deferredPrompt = null;

        function checkInstallability() {
            const installBtn = document.getElementById('installBtn');
            // If already installed in standalone mode, hide the button
            if (window.matchMedia('(display-mode: standalone)').matches) {
                installBtn.style.display = 'none';
                return;
            }
            // Otherwise, keep it visible – we'll handle click behavior
            installBtn.style.display = 'inline-flex';
            // If we have a deferred prompt, the button will trigger it
            // If not, we'll show a fallback message on click
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Ensure button is visible (in case it was hidden)
            document.getElementById('installBtn').style.display = 'inline-flex';
        });

        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            document.getElementById('installBtn').style.display = 'none';
        });

        function installApp() {
            if (deferredPrompt) {
                // Native install prompt
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    } else {
                        console.log('User dismissed the install prompt');
                    }
                    deferredPrompt = null;
                    // After prompt, we hide the button if installed or keep visible? 
                    // We'll check again after.
                    checkInstallability();
                });
            } else {
                // Fallback for browsers that don't support beforeinstallprompt (e.g., iOS Safari)
                alert('To install this app on your device, use your browser\'s "Add to Home Screen" or "Install App" feature.');
            }
        }

        // ─────────────────────────────────────────────────────────────
        //  PWA: INLINE MANIFEST & SERVICE WORKER
        // ─────────────────────────────────────────────────────────────
        (function registerPWA() {
            // 1. Inline manifest as data URI (blob) — using the custom logo
            const manifestData = {
                name: "Meal Planner Pro",
                short_name: "Meal Planner",
                description: "Plan your weekly meals with ease.",
                start_url: ".",
                display: "standalone",
                background_color: "#f5f7fb",
                theme_color: "#3b82f6",
                icons: [{
                    src: "https://i.ibb.co/gLXWj0Tn/c8a71cc8d8bc8e067883b4c4f4d184b0.jpg",
                    sizes: "192x192",
                    type: "image/jpeg",
                    purpose: "any maskable"
                }, {
                    src: "https://i.ibb.co/gLXWj0Tn/c8a71cc8d8bc8e067883b4c4f4d184b0.jpg",
                    sizes: "512x512",
                    type: "image/jpeg",
                    purpose: "any maskable"
                }]
            };
            const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
            const manifestURL = URL.createObjectURL(manifestBlob);
            document.getElementById('manifestLink').href = manifestURL;

            // 2. Service worker registration using a blob URL
            if ('serviceWorker' in navigator) {
                const swCode = `
                            self.addEventListener('install', function(e) {
                                e.waitUntil(
                                    caches.open('meal-planner-v1').then(function(cache) {
                                        return cache.addAll([
                                            '/',
                                            '/index.html'
                                        ]);
                                    })
                                );
                            });
                            self.addEventListener('fetch', function(e) {
                                e.respondWith(
                                    caches.match(e.request).then(function(response) {
                                        return response || fetch(e.request);
                                    })
                                );
                            });
                        `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swURL = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swURL)
                    .then(() => console.log('Service Worker registered (blob)'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            }
        })();

        // ─────────────────────────────────────────────────────────────
        //  INIT: check session
        // ─────────────────────────────────────────────────────────────
        (function init() {
            const session = getSession();
            if (session && getUsers()[session.username]) {
                showApp();
            } else {
                authContainer.classList.remove('hidden');
                appContainer.style.display = 'none';
                isLogin = true;
                toggleAuthMode();
            }
        })();
    </script>
</body>
</html>
